name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Per-PR database. Branches off the production project's primary branch so
  # migrations and the Railway preview run against real prod schema + data
  # without touching prod itself. Skipped on pushes to main and on fork PRs
  # (forks get no secrets), in which case the jobs below fall back to the
  # offline placeholder URL.
  #
  # This job only *ensures the branch exists*. It deliberately exposes no
  # outputs: the action masks the branch password, and GitHub strips masked
  # values out of job outputs, so a `db_url` job output always arrives empty
  # downstream. Each consuming job re-runs the action instead — it is
  # idempotent and returns the existing branch — and reads it as a step output,
  # which is not stripped. Creating it here first keeps those two jobs from
  # racing to create the same branch name.
  neon-branch:
    name: Create Neon branch
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Create Neon branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          # Stable name so re-runs and later pushes reuse the same branch
          # rather than piling up one per commit.
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

  verify:
    name: Lint, format, typecheck, build
    runs-on: ubuntu-latest
    needs: [neon-branch]
    # `needs` would otherwise skip this job whenever neon-branch is skipped
    # (main pushes, fork PRs). Run unless the branch job actually failed.
    if: >-
      !cancelled() &&
      (needs.neon-branch.result == 'success' ||
       needs.neon-branch.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Resolves to the branch neon-branch already created. Skipped on main
      # pushes and fork PRs; the steps below then fall back to a placeholder.
      - name: Resolve Neon branch
        id: neon
        if: needs.neon-branch.result == 'success'
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      # Validate the drizzle migration journal/snapshots are consistent before
      # the deploy's pre-deploy `pnpm db:migrate` tries to apply them. Offline
      # check (no DB connection); the URL only satisfies drizzle.config.ts.
      - name: Check migrations
        run: pnpm exec drizzle-kit check
        env:
          DATABASE_URL: postgres://drizzle:drizzle@localhost:5432/drizzle

      # Apply the migrations to the PR's Neon branch. This is the check the
      # offline `drizzle-kit check` above can't do: proving the migrations
      # actually apply to production's current schema and data before the
      # deploy's pre-deploy `pnpm db:migrate` tries the same thing for real.
      - name: Apply migrations to Neon branch
        if: needs.neon-branch.result == 'success'
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}

      - name: Format check
        run: pnpm format:check

      # Fail if any `<Trans>`/`t` string in the source hasn't been extracted
      # into the `.po` catalogs. A missing entry renders the message's raw
      # generated ID in the UI (e.g. the "Today" empty state showing "PK3-Q2"
      # instead of "Nothing new today") — the symptom of adding a string but
      # forgetting `pnpm i18n:extract`. This is a *freshness* check on the
      # message set only: `git diff` catches new/removed msgids. It does not
      # gate on untranslated `msgstr`s, since a translation backlog for the
      # non-source locales is filled separately and is expected.
      - name: Check i18n catalogs are up to date
        run: |
          pnpm i18n:extract
          if ! git diff --quiet -- src/locales; then
            echo "::error::Translation catalogs are stale. Run 'pnpm i18n:extract' and commit src/locales."
            git --no-pager diff --stat -- src/locales
            exit 1
          fi

      # Build first: the TanStack Router Vite plugin generates the gitignored
      # src/routeTree.gen.ts, which lint and typecheck both need to resolve.
      - name: Build
        run: pnpm build

      - name: Build extension
        run: pnpm extension:build

      - name: Typecheck extension
        run: pnpm --filter standard-reader-extension compile

      - name: Lint extension
        run: pnpm exec oxlint extension/src src/server/extension src/routes/api/extension src/routes/extension.connected.tsx

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          # Inert today — the suite mocks the DB layer and never connects, and
          # vitest.setup.ts supplies its own placeholder when this is unset.
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}

  # Lexicon schemas (`app.standard-reader.*` in ./lexicons/) are linted on every
  # run and published to the network on merge to main, both via the `goat` CLI.
  # goat is a Go binary; `pnpm lex:lint` / `pnpm atproto:publish-lexicons` wrap
  # it (see scripts/goat-lex.mjs). This job is independent of the app build:
  # lint gives fast feedback on schema edits, and `goat lex publish` is
  # idempotent (unchanged schemas are a no-op).
  lexicons:
    name: Lint & publish lexicons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # goat-lex.mjs imports `dotenv/config`, so it needs node_modules present.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install goat
        run: |
          go install github.com/bluesky-social/goat@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Validate our own schemas. Runs on every push and PR. `lex:lint` scopes
      # `goat lex lint` to lexicons/app/standard-reader (our NSID authority);
      # the vendored upstream copies under lexicons/{app/bsky,at,com} inherently
      # trip lint warnings we can't fix, and publishing only touches ours.
      - name: Lint lexicons
        run: pnpm lex:lint

      # Publish only when landing on main. `goat lex publish` writes new/updated
      # `com.atproto.lexicon.schema` records to the account that controls the
      # `standard-reader.app` NSID authority; unchanged schemas are skipped. A
      # lint failure above stops this step from running.
      #
      # Reuses the existing feedback-agent secrets: USERINPUT_OWNER_* is the
      # `standard-reader.app` owner account, which is the same account that owns
      # the lexicon NSID authority. goat-lex.mjs maps LEXICON_PUBLISH_* onto the
      # GOAT_USERNAME/GOAT_PASSWORD vars goat reads.
      - name: Publish lexicons
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm atproto:publish-lexicons
        env:
          LEXICON_PUBLISH_IDENTIFIER: ${{ secrets.USERINPUT_OWNER_IDENTIFIER }}
          LEXICON_PUBLISH_APP_PASSWORD: ${{ secrets.USERINPUT_OWNER_APP_PASSWORD }}

  # Repoint the Railway PR environment at the Neon branch. Railway clones
  # variables from production when it creates a preview, so without this the
  # preview boots against the production DATABASE_URL.
  railway-preview-db:
    name: Point Railway preview at Neon branch
    runs-on: ubuntu-latest
    needs: [neon-branch]
    if: needs.neon-branch.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Set preview DATABASE_URL
        run: node scripts/railway-set-preview-db.mjs
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: fbde7ed0-9be3-4364-8892-c4aa80b2f79e
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.number }}
          # Every service in the PR environment that reads DATABASE_URL. The
          # ingest worker *writes* to the read-model, so leaving it on the
          # cloned production URL would have previews writing to prod. `tap`
          # uses its own TAP_DATABASE_URL and is not in scope here.
          SERVICES: web,ingest
