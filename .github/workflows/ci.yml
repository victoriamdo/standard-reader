name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, format, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Validate the drizzle migration journal/snapshots are consistent before
      # the deploy's pre-deploy `pnpm db:migrate` tries to apply them. Offline
      # check (no DB connection); the URL only satisfies drizzle.config.ts.
      - name: Check migrations
        run: pnpm exec drizzle-kit check
        env:
          DATABASE_URL: postgres://drizzle:drizzle@localhost:5432/drizzle

      - name: Format check
        run: pnpm format:check

      # Build first: the TanStack Router Vite plugin generates the gitignored
      # src/routeTree.gen.ts, which lint and typecheck both need to resolve.
      - name: Build
        run: pnpm build

      - name: Build extension
        run: pnpm extension:build

      - name: Typecheck extension
        run: pnpm --filter standard-reader-extension compile

      - name: Lint extension
        run: pnpm exec oxlint extension/src src/server/extension src/routes/api/extension src/routes/extension.connected.tsx

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
