<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standard Reader</title>
    <script type="module" src="./prerender.ts"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        background-color: #fffcfc;
        color: #211f1f;
        color-scheme: light;
        font-family: "Atkinson Hyperlegible Next", system-ui, sans-serif;
        margin: 0;
        min-height: 280px;
        padding: 0;
        width: 400px;
      }

      body {
        overflow-x: hidden;
      }

      #root {
        min-height: 280px;
        width: 400px;
      }

      .sr-shell {
        display: flex;
        flex-direction: column;
        min-height: 280px;
        width: 400px;
      }

      .sr-header {
        align-items: center;
        display: flex;
        gap: 0.5rem;
        padding: 1rem 1.25rem;
      }

      .sr-brand {
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .sr-header-spacer {
        flex: 1;
      }

      .sr-header-actions {
        height: 2rem;
        width: 4.5rem;
      }

      .sr-separator {
        background: #e8e4e4;
        height: 1px;
        width: 100%;
      }

      .sr-body {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 0.75rem;
        padding: 1.5rem 1.25rem;
      }

      .sr-body-center {
        align-items: center;
        padding-bottom: 2rem;
        padding-top: 1.5rem;
        text-align: center;
      }

      .sr-mark {
        background: #fff0f6;
        border-radius: 0.75rem;
        height: 3rem;
        margin-bottom: 0.5rem;
        width: 3rem;
      }

      .sr-mark-compass {
        background: #fff0f6;
      }

      .sr-headline,
      .sr-title {
        font-family: "Newsreader", Georgia, serif;
        font-size: 1.375rem;
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.2;
        margin: 0;
      }

      .sr-kicker {
        color: #c2502b;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        margin: 0;
        text-transform: uppercase;
      }

      .sr-meta,
      .sr-muted {
        color: #656161;
        font-size: 0.875rem;
        line-height: 1.4;
        margin: 0;
      }

      .sr-host {
        background: #fff0f6;
        border-radius: 0.5rem;
        color: #c2502b;
        font-family: "Spline Sans Mono", ui-monospace, monospace;
        font-size: 0.8125rem;
        margin: 0;
        padding: 0.5rem 0.75rem;
      }

      .sr-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-top: 0.25rem;
      }

      .sr-button {
        border: 1px solid transparent;
        border-radius: 999px;
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        line-height: 1;
        padding: 0.625rem 1rem;
      }

      .sr-button-primary {
        background: #c2502b;
        color: #fff;
      }

      .sr-button-secondary {
        background: #f4f0f0;
        color: #211f1f;
      }

      .sr-footer {
        padding: 0.875rem 1.25rem;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Atkinson+Hyperlegible+Next:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
