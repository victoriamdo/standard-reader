<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Standard Reader</title>
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#f6eee7"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#28211d"
    />
    <style>
      /* Editorial palette (mirrors src/components/reader/theme.ts): the page
         surface matches the sidebar (uiColor.bgSubtle) in each scheme, and the
         accent is the terracotta editorial tone — no more loud orange. */
      :root {
        color-scheme: light dark;
        --bg: #f7f3ec;
        --fg: #3e332e;
        --muted: #815e46;
        --accent: #ad7f58;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #18130f;
          --fg: #f2e1ca;
          --muted: #dbb594;
          --accent: #b88c67;
        }
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: grid;
        place-items: center;
        padding: 2rem;
        background: var(--bg);
        color: var(--fg);
        font-family:
          "Atkinson Hyperlegible Next",
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        line-height: 1.5;
        text-align: center;
      }
      main {
        max-width: 26rem;
      }
      .mark {
        width: 3.5rem;
        height: 3.5rem;
        margin: 0 auto 1.25rem;
        border-radius: 0.9rem;
        display: grid;
        place-items: center;
        background: color-mix(in srgb, var(--accent) 14%, transparent);
        color: var(--accent);
      }
      h1 {
        font-size: 1.375rem;
        margin: 0 0 0.5rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1.5rem;
        color: var(--muted);
      }
      button {
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        border: 0;
        border-radius: 999px;
        padding: 0.65rem 1.4rem;
        color: var(--bg);
        background: var(--fg);
      }
      button:hover {
        filter: brightness(1.05);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
          <path
            d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"
          />
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>
        This page hasn't been saved for offline reading yet. Reconnect and try
        again — pages you've already visited stay available.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
